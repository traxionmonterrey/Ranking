<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traxión | Dashboard Logistic </title>
    <!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="favicon-traxion.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Segoe UI',Tahoma,Verdana,sans-serif;
    background:#f3f4f6;
}
.layout{
    display:flex;
    height:100vh;
}
.sidebar{
    width:260px;
    background:#1f2937;
    color:#fff;
    padding:20px;
    overflow-y:auto;
}
.sidebar h1{
    color:#84cc16;
    font-size:22px;
    margin-bottom:30px;
    text-align:center;
}
.menu-group{
    margin-bottom:25px;
}
.menu-group-title{
    font-size:11px;
    color:#9ca3af;
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:1px;
    font-weight:700;
}
.menu-item{
    display:flex;
    align-items:center;
    gap:11px;
    padding:12px 15px;
    margin-bottom:8px;
    border-radius:8px;
    color:#e5e7eb;
    text-decoration:none;
    font-weight:600;
    transition:all 0.3s;
    font-size:14px;
}
.menu-item svg{
    flex-shrink:0;
    width:18px;
    height:18px;
    fill:none;
    stroke:#9ca3af;
    stroke-width:1.7;
    stroke-linecap:round;
    stroke-linejoin:round;
    transition:stroke 0.3s;
}
.menu-item:hover{
    background:#374151;
    transform:translateX(5px);
}
.menu-item:hover svg{
    stroke:#84cc16;
}
.menu-item.active{
    background:#84cc16;
    color:#1f2937;
}
.menu-item.active svg{
    stroke:#1f2937;
}
.main{
    flex:1;
    background:#fff;
    position:relative;
    overflow:hidden;
}
.main::before{
    content:'';
    position:absolute;
    inset:0;
    background:
      linear-gradient(rgba(255,255,255,.75),rgba(255,255,255,.75)),
      url("fondotraxion.jpeg");
    background-size:cover;
    background-position:center;
}
.hero{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}
.hero img{
    width:180px;
    margin-bottom:30px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1));
}
.hero h2{
    font-size:56px;
    letter-spacing:6px;
    font-weight:900;
    color:#1f2937;
    margin-bottom:10px;
}
.hero p{
    margin-top:10px;
    font-size:18px;
    color:#6b7280;
    font-weight:500;
}
.hero .tagline{
    font-size:16px;
    color:#84cc16;
    font-weight:700;
    margin-top:20px;
    letter-spacing:2px;
}
@media (max-width:1024px){
    .layout{flex-direction:column}
    .sidebar{width:100%;max-height:300px}
}
@media (max-width:640px){
    .hero h2{font-size:36px;letter-spacing:3px}
    .hero p{font-size:16px}
    .hero img{width:140px}
}
</style>
</head>
<body>
<div class="layout">

    <aside class="sidebar">
        <h1>TRAXIÓN</h1>

        <div class="menu-group">
            <div class="menu-group-title">Logística</div>

          <a href="Dashboard_ranking.html" class="menu-item">
                <svg viewBox="0 0 24 24">
                    <path d="M4 14c0-5 2-9 8-9s8 4 8 9"/>
                    <path d="M4 14h16v1.5a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V14z"/>
                    <path d="M7 14V9.5"/>
                    <path d="M7 14h6"/>
                    <path d="M20 14c0 1-0.5 2-1.5 2.5"/>
                </svg>
                    Ranking
            </a>
            
        </div>
    </aside>

    <main class="main">
        <div class="hero">
            <h2>TRAXIÓN</h2>
            <p>Logística · Operaciones · Seguridad</p>
            <p class="tagline">Movemos lo más valioso, conectamos destinos</p>
        </div>
    </main>

</div>
</body>
</html>
